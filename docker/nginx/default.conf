server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy al backend de LibreSpeed (contenedor "speedtest-backend" del mismo docker-compose).
    # Queda bajo el mismo origen (localhost:8080) para que el navegador nunca cruce de dominio
    # y no haya que lidiar con CORS.
    location /speedtest-backend/ {
        proxy_pass http://speedtest-backend:8080/;

        # Necesario: el test de descarga/subida transmite datos en streaming.
        # Si nginx bufferea, los resultados salen mal calculados.
        proxy_buffering off;
        proxy_request_buffering off;

        # El test puede tardar varios segundos con conexiones rápidas.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
